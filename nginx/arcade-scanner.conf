# Arcade Video Scanner — Nginx Reverse Proxy Config
# Replace YOUR_DOMAIN.com with your actual domain.
#
# Assumes Let's Encrypt certificates are already in place via Certbot.
# Certbot usually manages the SSL block automatically; if so, only keep
# the location blocks inside the existing server {} block it created.

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com;

    # Let's Encrypt ACME challenge (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN.com;

    # ── Let's Encrypt certificates (managed by certbot) ──────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options    "nosniff"          always;
    add_header X-Frame-Options           "SAMEORIGIN"       always;

    # ── Large uploads (video streaming) ──────────────────────────────────────
    client_max_body_size 0;          # No limit (streaming)
    proxy_read_timeout   3600s;      # 1 hour for long video streams
    proxy_send_timeout   3600s;

    # ── Proxy to Arcade Scanner Python server ─────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required: tell the Python server the original scheme was HTTPS
        # so it generates https:// URLs in DeoVR JSON (thumbnails + streams)
        proxy_set_header   X-Forwarded-Proto  https;

        # Standard proxy headers
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;

        # Keep-alive
        proxy_set_header   Connection         "";
    }

    # ── Thumbnail caching (optional but recommended) ──────────────────────────
    location /thumbnails/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Forwarded-Proto  https;

        # Cache thumbnails in Nginx for 7 days
        proxy_cache_valid  200 7d;
        add_header         Cache-Control "public, max-age=604800";
    }
}
